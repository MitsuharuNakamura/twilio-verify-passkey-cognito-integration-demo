version: 1.0
runtime: nodejs18

build:
  commands:
    build:
      - npm ci
      - npm run build

run:
  command: node .next/standalone/server.js
  network:
    port: 8080
  env:
    - name: NODE_ENV
      value: production
    - name: PORT
      value: "8080"
    - name: AWS_REGION
      value: ap-northeast-1
    - name: USE_SECRETS_MANAGER
      value: "true"
